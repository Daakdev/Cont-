# Blueprint de Despliegue para Cont+ en Render

services:
  # =====================
  # BACKEND (API)
  # =====================
  - type: web
    name: cont-backend
    runtime: node
    plan: free
    region: eu
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: cont-frontend
          type: web
          property: host

  # =====================
  # FRONTEND
  # =====================
  - type: web
    name: cont-frontend
    runtime: static
    rootDir: fronted
    buildCommand: npm install && npm run build
    staticPublishPath: pages
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cont-backend.onrender.com/api

